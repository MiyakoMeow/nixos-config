name: "Update flake.lock"
on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse substituters config
        id: subs
        run: |
          echo "substituters=$(grep '^url = ' substituters.toml | sed 's/url = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "trusted-public-keys=$(grep '^public-key = ' substituters.toml | sed 's/public-key = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = ${{ steps.subs.outputs.substituters }}
            trusted-public-keys = ${{ steps.subs.outputs.trusted-public-keys }}

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App Token
        if: steps.check-changes.outputs.changed == 'true'
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create or Update Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.gen-token.outputs.token }}
          commit-message: "flake.lock: update"
          title: "flake.lock: update"
          body: |
            由 GitHub Actions 自动更新 flake.lock
          branch: update/flake
          labels: |
            automated
            dependencies


