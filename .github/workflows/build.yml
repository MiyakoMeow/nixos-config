name: "Build and check"
on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse substituters config
        id: subs
        run: |
          echo "substituters=$(grep '^url = ' substituters.toml | sed 's/url = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "trusted-public-keys=$(grep '^public-key = ' substituters.toml | sed 's/public-key = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux x86_64-darwin aarch64-darwin
            substituters = ${{ steps.subs.outputs.substituters }}
            trusted-public-keys = ${{ steps.subs.outputs.trusted-public-keys }}

      - name: Show nixpkgs version
        run: nix eval --impure --raw --expr "(import (builtins.getFlake \"path:${PWD}\").inputs.nixpkgs {}).lib.version"

      - name: Flake check
        run: nix flake check --show-trace

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse substituters config
        id: subs
        run: |
          echo "substituters=$(grep '^url = ' substituters.toml | sed 's/url = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "trusted-public-keys=$(grep '^public-key = ' substituters.toml | sed 's/public-key = "\(.*\)"/\1/' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = ${{ steps.subs.outputs.substituters }}
            trusted-public-keys = ${{ steps.subs.outputs.trusted-public-keys }}

      - name: Build MiyakoMeowWSL
        run: |
          nix build .#nixosConfigurations.MiyakoMeowWSL.config.system.build.toplevel --accept-flake-config --print-build-logs

      - name: Build MiyakoMeowWorkStatNixOS
        run: |
          nix build .#nixosConfigurations.MiyakoMeowWorkStatNixOS.config.system.build.toplevel --accept-flake-config --print-build-logs

      - name: Build MiyakoMeowMateBookNixOS
        run: |
          nix build .#nixosConfigurations.MiyakoMeowMateBookNixOS.config.system.build.toplevel --accept-flake-config --print-build-logs
